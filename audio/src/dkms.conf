PACKAGE_NAME="snd_hda_macbookpro"
PACKAGE_VERSION="1.0"

# install.cirrus.driver.sh does the real work: it detects the running
# kernel version, downloads/extracts the matching sound/hda kernel
# source (from the distro's linux-source package on Ubuntu/Debian, or
# from kernel.org otherwise), applies the Cirrus CS8409 codec patches,
# and drops in its own Makefiles - all *before* the actual module
# build. It also self-corrects BUILT_MODULE_NAME/BUILT_MODULE_LOCATION/
# PRE_BUILD below via sed every time it runs, so don't be surprised if
# you see those change - that's expected, not a bug.
#
# The "--dkms" flag is important: it tells the script to only prepare
# the source tree and let DKMS itself run the actual `make`/`make
# install`, instead of the script doing its own build in addition.
# NOTE: install.cirrus.driver.sh in this package has a local-cache patch
# (search for "local cache patch" in that file) that saves the downloaded
# + patched sound/hda source tree to /var/cache/mbp-cirrus-audio-dkms/hda-src/
# keyed by kernel_version. Ubuntu kernel ABI bumps (eg 7.0.0-27-generic ->
# 7.0.0-29-generic) share the same kernel_version, so routine kernel
# updates reuse the cache and need NO network access at all. Only a
# genuinely new kernel_version (a real upstream bump, eg 7.0 -> 7.1) still
# triggers a fresh download.
PRE_BUILD="install.cirrus.driver.sh -k $kernelver --dkms"

# Custom MAKE command:
#  - explicitly pins KERNELRELEASE/KDIR/M so kbuild finds the right
#    kernel and the right (self-generated) module source subdirectory
#  - CFLAGS_MODULE disables a handful of now-fatal warnings
#    (-Wno-error, -Wno-incompatible-pointer-types, etc.) that modern
#    GCC (14+) treats as errors in this out-of-tree code, plus enables
#    the driver's Apple-specific pin/codec fixups
# This is the fix from github.com/davidjo/snd_hda_macbookpro issue #164,
# originally written for kernel 6.17 on GCC 14+; it applies equally to
# kernel 7.x since the compiler-strictness issue is unrelated to the
# specific kernel version.
MAKE="make KERNELRELEASE=${kernelver} KDIR=/lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/build/hda/codecs/cirrus CFLAGS_MODULE='-DAPPLE_PINSENSE_FIXUP -DAPPLE_CODECS -DCONFIG_SND_HDA_RECONFIG=1 -Wno-unused-variable -Wno-unused-function -Wno-error -Wno-incompatible-pointer-types'"

BUILT_MODULE_NAME[0]="snd-hda-codec-cs8409"
BUILT_MODULE_LOCATION[0]="build/hda/codecs/cirrus"
DEST_MODULE_LOCATION[0]="/updates/codecs/cirrus"

AUTOINSTALL="yes"
