# Options for the mbp-t1-touchbar-dkms driver (apple-ib-tb).
#
# fnmode: 0 = media/special keys, 1 = F1-F12, 2 = escape + media keys
#         with physical Fn key toggling between modes (matches macOS
#         default and Bootcamp behaviour)
# idle_timeout / dim_timeout: seconds of inactivity before the Touch Bar
#         dims/turns off; -1 disables the timeout entirely
#
# Edit and reboot (or `sudo rmmod apple-ib-tb; sudo modprobe apple-ib-tb`)
# for changes to take effect.
options apple-ib-tb fnmode=2 idle_timeout=-1 dim_timeout=-1
