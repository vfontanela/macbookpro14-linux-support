PACKAGE_NAME="mbp-t1-touchbar"
PACKAGE_VERSION="0.3"

# Built together from one Makefile (kbuild handles ordering internally),
# but apple-ibridge must be *loaded* first since apple-ib-tb / apple-ib-als
# call its exported symbols (appleib_find_report_field, appleib_find_hid_field).
BUILT_MODULE_NAME[0]="apple-ibridge"
DEST_MODULE_LOCATION[0]="/kernel/drivers/hid"

BUILT_MODULE_NAME[1]="apple-ib-tb"
DEST_MODULE_LOCATION[1]="/kernel/drivers/hid"

BUILT_MODULE_NAME[2]="apple-ib-als"
DEST_MODULE_LOCATION[2]="/kernel/drivers/hid"

AUTOINSTALL="yes"
CLEAN="make clean"
